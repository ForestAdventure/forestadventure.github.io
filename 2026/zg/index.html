                {text: '5', value: 5},
                {text: '6', value: 6},
                {text: '10', value: 10}
            ],
            change: function (arr) {
                store.showFirstCount = arr[0];
                render();
            }
        },
        {
            title: 'Печатать на отдельной странице',
            value: false,
            change: function (checked) {
                store.newPage = checked;
                render()
            }
        },
        {
            title: 'Автоскролл',
            value: Scrolling.enabled,
            change: function (checked) {
                Scrolling.enabled = checked;
            }
        },
    ]).show();
</script>
